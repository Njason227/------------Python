{% extends "base.html" %}
{% block title %}Тяжесть психического состояния{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mt-3">
    <h4><i class="bi bi-brain"></i> Тяжесть психического состояния</h4>
    <a href="{% url 'references:mental_severity_create' %}" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-lg"></i> Добавить
    </a>
</div>
<div class="table-responsive mt-3">
    <table class="table table-hover">
        <thead><tr><th>Название</th><th>Уровень</th><th></th></tr></thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td><span class="badge bg-info">{{ item.level }}</span></td>
                <td class="text-end">
                    <a href="{% url 'references:mental_severity_edit' pk=item.pk %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                    <a href="{% url 'references:mental_severity_delete' pk=item.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-center text-muted">Нет данных</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
