{% extends "base.html" %}
{% block title %}Диагнозы МКБ-11{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mt-3">
    <h4><i class="bi bi-clipboard2-pulse"></i> Диагнозы МКБ-11</h4>
    <a href="{% url 'references:diagnosis_create' %}" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-lg"></i> Добавить
    </a>
</div>

<div class="card mt-3">
    <div class="card-body">
        <form method="get" class="row g-2">
            <div class="col-md-8">
                <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Поиск по коду или названию...">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-outline-primary w-100"><i class="bi bi-search"></i> Найти</button>
            </div>
            <div class="col-md-2">
                <a href="{% url 'references:diagnosis_list' %}" class="btn btn-outline-secondary w-100">Сбросить</a>
            </div>
        </form>
    </div>
</div>

<div class="table-responsive mt-3">
    <table class="table table-hover table-sm">
        <thead><tr><th>Код</th><th>Название</th><th>Блок</th><th>Класс</th><th></th></tr></thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td><strong>{{ item.code }}</strong></td>
                <td>{{ item.name }}</td>
                <td><small>{{ item.block }}</small></td>
                <td><small>{{ item.chapter }}</small></td>
                <td class="text-end">
                    <a href="{% url 'references:diagnosis_edit' pk=item.pk %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                    <a href="{% url 'references:diagnosis_delete' pk=item.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5" class="text-center text-muted">Диагнозов нет</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
