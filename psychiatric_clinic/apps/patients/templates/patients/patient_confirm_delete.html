{% extends "base.html" %}
{% block title %}Удаление пациента{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Подтверждение удаления</h5>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить пациента?</p>
                <p class="fw-bold">{{ patient.full_name }}</p>
                <p class="text-muted">Дата рождения: {{ patient.date_of_birth|date:"d.m.Y" }}</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Удалить
                        </button>
                        <a href="{% url 'patients:detail' pk=patient.pk %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
